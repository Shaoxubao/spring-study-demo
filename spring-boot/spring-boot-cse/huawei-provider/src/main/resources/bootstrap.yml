server:
  env: production

spring:
  application:
    name: huawei-provider
  cloud:
    servicecomb:
      discovery:
        enabled: true
        watch: false
        address: http://192.168.43.8:30100
        appName: myApp
        serviceName: ${spring.application.name}
        version: 0.0.1
        environment: production
      config:
        enabled: true
        serverType: kie
        serverAddr: http://192.168.43.8:30110
        fileSource: com.baoge.yaml
        kie:
          custom-label: app
          custom-label-value: myApp
